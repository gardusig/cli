# Step tier labels per workflow job. Keys match step `id` in the workflow file.
# Tiers: short (3m), medium (6m), long (9m). Job timeout-minutes = sum of its steps.

pull-request.yaml:
  resolve:
    checkout: short
    buildx: short
    meta: short
  version-check:
    checkout: short
    buildx: short
    version-check: medium
  unit-test:
    checkout: short
    buildx: short
    unit-test: long
  testpypi:
    checkout: short
    buildx: short
    testpypi: medium
  testpypi-consumer:
    checkout: short
    buildx: short
    testpypi-consumer: medium

release.yaml:
  resolve:
    checkout: short
    meta: short
  publish-pypi:
    checkout: short
    buildx: short
    pypi: medium
  docker-release:
    checkout: short
    buildx: short
    runtime: medium
    ci-tools: short
    docker-login: short
    docker-push: medium
    runtime-smoke: medium
  github-release:
    checkout: short
    ci-tools: short
    github-release: short
