# Step tier labels per workflow job. Keys match step `id` in the workflow file.
# Tiers: short (3m), medium (6m), long (9m). Job timeout-minutes = sum of its steps.

pull-request.yaml:
  resolve:
    checkout: short
    buildx: short
    meta: short
  version-check:
    checkout: short
    buildx: short
    version-check: medium
  unit-test:
    checkout: short
    buildx: short
    unit-test: long

release.yaml:
  resolve:
    checkout: short
    meta: short
  publish-testpypi:
    checkout: short
    buildx: short
    testpypi: medium
  testpypi-consumer:
    checkout: short
    buildx: short
    testpypi-consumer: medium
  publish-pypi:
    checkout: short
    buildx: short
    publish-pypi: medium
  publish-docker:
    checkout: short
    buildx: short
    runtime: medium
    ci-tools: short
    docker-login: short
    publish-docker: medium
    runtime-smoke: medium
  publish-github:
    checkout: short
    ci-tools: short
    publish-github: short
