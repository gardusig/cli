# Unit test coverage gate (scripts/docker/run-unit.sh, CI unit job).
# Measures gardusig_cli library code; integration registry omitted from run.
[run]
source = gardusig_cli
omit =
    gardusig_cli/integration/*

[report]
fail_under = 80
show_missing = true
skip_empty = true
include =
    gardusig_cli/cli.py
    gardusig_cli/commands/*
