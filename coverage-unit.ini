# Unit test coverage gate used by the CI unit job.
# Measures src library code; integration registry omitted from run.
# chat/craft Typer surfaces are exercised in regression pack (tests/opencode, tests/services).
# deploy/pipeline/config/configure/test_cmd/tasks/puzzles omit: covered by integration,
# services tests, or operator lanes (see docs/ci-workflows.md).
[run]
source = src
omit =
    src/integration/*
    src/commands/chat.py
    src/commands/craft.py
    src/commands/deploy_cmd.py
    src/commands/pipeline.py
    src/commands/config_cmd.py
    src/commands/configure_cmd.py
    src/commands/puzzles.py
    src/commands/test_cmd.py
    src/commands/tasks.py

[report]
fail_under = 80
show_missing = true
skip_empty = true
include =
    src/cli.py
    src/commands/*
