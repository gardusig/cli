repo: gardusig/resume-validator
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 6
      allowed_root_dirs:
        - .github
        - backend/rust
        - backend/rust/src
        - backend/rust/test
      allowed_root_files:
        - .gitignore
        - Cargo.lock
        - Cargo.toml
        - LICENSE
        - README.md
        - rust-toolchain.toml
      allowed_extensions:
        - .lock
        - .md
        - .rs
        - .toml
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
        - Cargo.lock
        - Cargo.toml
        - LICENSE
        - rust-toolchain.toml
