repo: gardusig/prolog
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 4
      allowed_root_dirs:
        - .github
        - .workflows
        - src
        - test
      allowed_root_files:
        - .gitignore
        - Dockerfile
        - LICENSE
        - Makefile
        - README.md
      allowed_extensions:
        - .md
        - .pl
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
        - Dockerfile
        - LICENSE
        - Makefile
