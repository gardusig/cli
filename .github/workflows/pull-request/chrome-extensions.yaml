repo: gardusig/chrome-extensions
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 4
      allowed_root_dirs:
        - .github
        - docs
        - extensions
        - src
        - tests
      allowed_root_files:
        - .gitignore
        - .prettierignore
        - CONTRIBUTING.md
        - LICENSE
        - README.md
        - eslint.config.js
        - manifest.json
        - package-lock.json
        - package.json
        - tsconfig.json
        - vite.config.ts
      allowed_extensions:
        - .html
        - .js
        - .json
        - .md
        - .mjs
        - .png
        - .ts
        - .txt
        - .yml
      allowed_filenames:
        - .gitignore
        - .prettierignore
        - LICENSE
  - id: unit
    name: Verification (format, lint, types, tests)
    target: unit-test
    needs: repo-hygiene
  - id: build
    name: Build
    target: build
    needs: unit
