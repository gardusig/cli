repo: gardusig/code
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 2
      allowed_root_dirs:
        - .github
        - assembly
        - c
        - cpp
        - csharp
        - go
        - java
        - javascript
        - python
        - rust
        - typescript
      allowed_root_files:
        - .gitignore
        - .gitmodules
        - LICENSE
        - Makefile
        - README.md
      allowed_extensions:
        - .md
        - .yml
      allowed_filenames:
        - .gitignore
        - .gitmodules
        - LICENSE
        - Makefile
