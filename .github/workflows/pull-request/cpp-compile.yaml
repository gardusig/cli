repo: gardusig/cpp
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 4
      allowed_root_dirs:
        - .github
        - reference
        - competition
      allowed_root_files:
        - .clang-format
        - .clang-tidy
        - .editorconfig
        - .gitignore
        - LICENSE
        - README.md
      allowed_extensions:
        - .cpp
        - .h
        - .in
        - .md
        - .out
        - .txt
        - .yml
      allowed_filenames:
        - .clang-format
        - .clang-tidy
        - .editorconfig
        - .gitignore
        - LICENSE
        - CMakeLists.txt
        - Makefile
  - id: compile
    name: Compile C++
    target: compile
    needs: repo-hygiene
  - id: smoke
    name: Contest I/O smoke
    target: smoke
    needs: compile
