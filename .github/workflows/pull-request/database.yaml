repo: gardusig/database
checkout:
  fetch_depth: 0
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      allowed_root_dirs:
        - .github
        - brazil
        - canada
        - catalog
        - docs
        - health
        - scripts
        - tasks
        - work-proof
      allowed_root_files:
        - .gitignore
        - README.md
        - SPLIT.md
      allowed_extensions:
        - .jpg
        - .json
        - .md
        - .pdf
        - .png
        - .py
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
  - id: validate
    name: Validate PR
    target: validate
    needs: repo-hygiene
    build_args:
      PR_BASE: origin/main
  - id: validate-tasks
    name: Validate task pairs
    target: validate-tasks
    needs: validate
