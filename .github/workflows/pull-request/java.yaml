repo: gardusig/java
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 4
      allowed_root_dirs:
        - .github
        - lib
        - examples
      allowed_root_files:
        - .gitignore
        - LICENSE
        - README.md
        - build.gradle
        - build.gradle.kts
        - pom.xml
        - settings.gradle
        - settings.gradle.kts
      allowed_extensions:
        - .gradle
        - .java
        - .kts
        - .md
        - .properties
        - .xml
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
        - LICENSE
        - build.gradle
        - build.gradle.kts
        - pom.xml
        - settings.gradle
        - settings.gradle.kts
