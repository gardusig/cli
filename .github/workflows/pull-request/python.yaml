repo: gardusig/python
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 4
      allowed_root_dirs:
        - .github
        - lib
        - examples
      allowed_root_files:
        - .gitignore
        - LICENSE
        - README.md
        - pyproject.toml
        - requirements.txt
      allowed_extensions:
        - .in
        - .md
        - .out
        - .py
        - .txt
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
        - LICENSE
        - pyproject.toml
        - requirements.txt
