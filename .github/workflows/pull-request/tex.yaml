repo: gardusig/tex
jobs:
  - id: lint
    name: Repo lint
    target: lint
  - id: repo-hygiene
    name: Repo structure
    target: repo-hygiene
    needs: lint
    hygiene_policy:
      max_depth: 5
      allowed_root_dirs:
        - .github
        - lib
        - versions
      allowed_root_files:
        - .gitignore
        - LICENSE
        - Makefile
        - README.md
      allowed_extensions:
        - .md
        - .tex
        - .yaml
        - .yml
      allowed_filenames:
        - .gitignore
        - LICENSE
        - Makefile
  - id: latex
    name: Compile resume PDFs
    target: latex
    needs: repo-hygiene
  - id: pages
    name: Deploy GitHub Pages
    needs: latex
    workflow_step: pages_deploy
    app_repo: gardusig/gardusig
