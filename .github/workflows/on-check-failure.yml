name: on-check-failure

on:
  workflow_run:
    workflows: [test]
    types: [completed]

permissions:
  issues: write
  pull-requests: write

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id="${{ github.event.workflow_run.id }}"
          repo="${{ github.event.workflow_run.repository.full_name }}"
          echo "Test workflow failed: run $run_id on $repo" >> "$GITHUB_STEP_SUMMARY"
