name: Operator craft plan

on:
  workflow_call:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      issue:
        description: GitHub issue number to plan
        required: true
        type: string
      ref:
        description: Git branch ref for app checkout
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      comment:
        description: Post plan as issue comment (requires comment_yes)
        required: false
        default: "false"
        type: string
      comment_yes:
        description: Confirm GitHub write for issue comment
        required: false
        default: "false"
        type: string
    secrets:
      CENTRAL_PIPELINE_PAT:
        required: false
      DEEPSEEK_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      issue:
        description: GitHub issue number to plan
        required: true
        type: string
      ref:
        description: Git branch ref for app checkout
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      comment:
        description: Post plan as issue comment (requires comment_yes)
        required: false
        default: "false"
        type: string
      comment_yes:
        description: Confirm GitHub write for issue comment
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  issues: write

jobs:
  plan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gardusig/operator-runner:latest
    steps:
      - name: Checkout yaml repo
        uses: actions/checkout@v4
        with:
          path: pipeline-src

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.sha || inputs.ref }}
          token: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
          path: app-src
          fetch-depth: 0

      - name: Install app dev dependencies
        run: |
          if [[ -f app-src/pyproject.toml ]] && grep -q '^name = "gardusig-cli"' app-src/pyproject.toml; then
            pip install --no-cache-dir -e "app-src[dev]"
          else
            pip install --no-cache-dir gardusig-cli
          fi

      - name: Gather issue context
        id: context
        env:
          REPOSITORY: ${{ inputs.repository }}
          ISSUE: ${{ inputs.issue }}
        run: |
          set -euo pipefail
          cd app-src
          cli gh --repo "$REPOSITORY" issue context "$ISSUE" --format json > /tmp/issue-context.json
          echo "context_bytes=$(wc -c < /tmp/issue-context.json)" >> "$GITHUB_OUTPUT"

      - name: Generate implementation plan
        id: plan
        env:
          REPOSITORY: ${{ inputs.repository }}
          ISSUE: ${{ inputs.issue }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          cd app-src
          cli opencode gh --repo "$REPOSITORY" issue --number "$ISSUE" --plan --plan-only \
            | tee /tmp/issue-plan.md

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-plan-${{ inputs.issue }}
          path: /tmp/issue-plan.md
          if-no-files-found: error

      - name: Comment plan on issue
        if: >-
          inputs.comment == 'true'
          && inputs.comment_yes == 'true'
        env:
          REPOSITORY: ${{ inputs.repository }}
          ISSUE: ${{ inputs.issue }}
        run: |
          set -euo pipefail
          cd app-src
          {
            printf '## [operator] plan\n\n'
            cat /tmp/issue-plan.md
          } > /tmp/issue-comment.md
          cli gh --repo "$REPOSITORY" issue comment "$ISSUE" \
            --body "$(cat /tmp/issue-comment.md)" --yes
