name: Operator test

on:
  workflow_call:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      ref:
        description: Git branch ref
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      base:
        description: Git base ref for selective resolve
        required: false
        default: main
        type: string
      package_limit:
        description: Max selective packages before full-suite fallback
        required: false
        default: "4"
        type: string
      pipeline:
        description: Pipeline name for multi-pipeline repos (full-suite fallback)
        required: false
        type: string
    secrets:
      CENTRAL_PIPELINE_PAT:
        required: false
      TESTPYPI_API_TOKEN:
        required: false
      PYPI_API_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      ref:
        description: Git branch ref
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      base:
        description: Git base ref for selective resolve
        required: false
        default: main
        type: string
      package_limit:
        description: Max selective packages before full-suite fallback
        required: false
        default: "4"
        type: string
      pipeline:
        description: Pipeline name for multi-pipeline repos (full-suite fallback)
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.meta.outputs.repository }}
      ref: ${{ steps.meta.outputs.ref }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      repo_slug: ${{ steps.meta.outputs.repo_slug }}
      pipeline: ${{ steps.meta.outputs.pipeline }}
      full_suite: ${{ steps.resolve.outputs.full_suite }}
      packages: ${{ steps.resolve.outputs.packages }}
    steps:
      - name: Checkout yaml repo
        uses: actions/checkout@v4
        with:
          path: pipeline-src

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.sha || inputs.ref }}
          token: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
          path: app-src
          fetch-depth: 0

      - name: Install cli
        run: |
          if [[ -f app-src/pyproject.toml ]] && grep -q '^name = "gardusig-cli"' app-src/pyproject.toml; then
            pip install --no-cache-dir -e "app-src[dev]"
          else
            pip install --no-cache-dir "gardusig-cli @ git+https://github.com/gardusig/cli@main"
          fi

      - name: Resolve selective packages
        id: resolve
        env:
          BASE: ${{ inputs.base }}
          PACKAGE_LIMIT: ${{ inputs.package_limit }}
        run: |
          set -euo pipefail
          cd app-src
          git fetch origin "$BASE" 2>/dev/null || true
          RESOLVE=$(cli test packages resolve \
            --base "origin/${BASE}" \
            --head HEAD \
            --path . \
            --package-limit "$PACKAGE_LIMIT" \
            --format json)
          echo "$RESOLVE"
          FULL=$(echo "$RESOLVE" | jq -r '.full_suite')
          PACKAGES=$(echo "$RESOLVE" | jq -c '.package_names')
          echo "full_suite=$FULL" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Export workflow metadata
        id: meta
        env:
          REPOSITORY: ${{ inputs.repository }}
          REF: ${{ inputs.ref }}
          SHA: ${{ inputs.sha }}
          PIPELINE: ${{ inputs.pipeline }}
        run: |
          SLUG="${REPOSITORY##*/}"
          CHECKOUT="${SHA:-$REF}"
          {
            echo "repository=$REPOSITORY"
            echo "ref=$REF"
            echo "checkout_ref=$CHECKOUT"
            echo "repo_slug=$SLUG"
            echo "pipeline=$PIPELINE"
          } >> "$GITHUB_OUTPUT"

  full-suite:
    name: Full suite (pull-request router)
    needs: resolve
    if: needs.resolve.outputs.full_suite == 'true'
    uses: ./pull-request-router.yml
    with:
      repo_slug: ${{ needs.resolve.outputs.repo_slug }}
      pipeline: ${{ needs.resolve.outputs.pipeline }}
      repository: ${{ needs.resolve.outputs.repository }}
      ref: ${{ needs.resolve.outputs.ref }}
      sha: ${{ needs.resolve.outputs.checkout_ref }}
    secrets: inherit

  package-test:
    name: Package ${{ matrix.package }}
    needs: resolve
    if: >-
      needs.resolve.outputs.full_suite != 'true'
      && needs.resolve.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.resolve.outputs.packages) }}
    container:
      image: ghcr.io/gardusig/operator-runner:latest
    steps:
      - name: Checkout yaml repo
        uses: actions/checkout@v4
        with:
          path: pipeline-src

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.repository }}
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          token: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
          path: app-src
          fetch-depth: 0

      - name: Install app dev dependencies
        run: |
          if [[ -f app-src/pyproject.toml ]] && grep -q '^name = "gardusig-cli"' app-src/pyproject.toml; then
            pip install --no-cache-dir -e "app-src[dev]"
          else
            pip install --no-cache-dir gardusig-cli
          fi

      - name: Run package tests
        env:
          CLI_CONFIG_DIR: config/ci
        run: |
          cli test packages run "${{ matrix.package }}" --path app-src
