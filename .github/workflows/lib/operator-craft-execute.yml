name: Operator craft execute

on:
  workflow_call:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      issue:
        description: GitHub issue number to execute
        required: true
        type: string
      ref:
        description: Git branch ref for app checkout
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      yes:
        description: Confirm token spend and GitHub writes (must be true)
        required: true
        type: string
      handoff_pr:
        description: Hand off to craft pr after checkpoints
        required: false
        default: "false"
        type: string
      comment:
        description: Post execute report as issue comment
        required: false
        default: "true"
        type: string
    secrets:
      CENTRAL_PIPELINE_PAT:
        required: false
      DEEPSEEK_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      repository:
        description: Full repository (e.g. gardusig/python-cli)
        required: true
        type: string
      issue:
        description: GitHub issue number to execute
        required: true
        type: string
      ref:
        description: Git branch ref for app checkout
        required: true
        type: string
      sha:
        description: Commit SHA (preferred over ref when set)
        required: false
        type: string
      yes:
        description: Confirm token spend and GitHub writes (must be true)
        required: true
        type: string
      handoff_pr:
        description: Hand off to craft pr after checkpoints
        required: false
        default: "false"
        type: string
      comment:
        description: Post execute report as issue comment
        required: false
        default: "true"
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  execute:
    if: inputs.yes == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gardusig/operator-runner:latest
    steps:
      - name: Checkout yaml repo
        uses: actions/checkout@v4
        with:
          path: pipeline-src

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.sha || inputs.ref }}
          token: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
          path: app-src
          fetch-depth: 0

      - name: Install app dev dependencies
        run: |
          if [[ -f app-src/pyproject.toml ]] && grep -q '^name = "gardusig-cli"' app-src/pyproject.toml; then
            pip install --no-cache-dir -e "app-src[dev]"
          else
            pip install --no-cache-dir gardusig-cli
          fi

      - name: Configure git
        run: |
          git config --global user.name "gardusig-operator"
          git config --global user.email "gardusig-operator@users.noreply.github.com"

      - name: Execute issue checkpoints
        id: execute
        env:
          REPOSITORY: ${{ inputs.repository }}
          ISSUE: ${{ inputs.issue }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          cd app-src
          ARGS=(opencode gh --repo "$REPOSITORY" execute "$ISSUE" --repo-root . --yes)
          if [[ "${{ inputs.handoff_pr }}" == "true" ]]; then
            ARGS+=(--pr)
          fi
          if [[ "${{ inputs.comment }}" != "true" ]]; then
            ARGS+=(--no-comment)
          fi
          cli "${ARGS[@]}" | tee /tmp/issue-execute.json

      - name: Upload execute artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-execute-${{ inputs.issue }}
          path: /tmp/issue-execute.json
          if-no-files-found: error
