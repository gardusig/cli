name: Workflow dispatch

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: Catalog workflow id (see catalog.yaml)
        required: true
        type: choice
        options:
          - pull-request
          - operator
          - operator-test
          - release
          - repo-review
          - tasks
          - project-recurrence
          - markdown
      repository:
        description: Target app repository (owner/name)
        required: false
        type: string
      ref:
        description: Git ref for the target app repo
        required: false
        default: main
        type: string
      sha:
        description: Commit SHA (optional)
        required: false
        type: string
      repo_slug:
        description: Repo slug for resolve/dispatch payloads
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch catalog workflow
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ inputs.workflow }}
          REPOSITORY: ${{ inputs.repository }}
          REF: ${{ inputs.ref }}
          SHA: ${{ inputs.sha }}
          REPO_SLUG: ${{ inputs.repo_slug }}
        run: |
          set -euo pipefail
          case "$WORKFLOW" in
            pull-request)
              gh workflow run pull-request-router.yml \
                --repo gardusig/cli \
                -f repository="${REPOSITORY}" \
                -f ref="${REF}" \
                -f sha="${SHA}" \
                -f repo_slug="${REPO_SLUG}"
              ;;
            operator)
              gh workflow run operator-dispatch.yml --repo gardusig/cli \
                -f lane=test -f repository="${REPOSITORY}" -f ref="${REF}" -f sha="${SHA}"
              ;;
            release|repo-review|tasks)
              gh workflow run "${WORKFLOW}.yml" --repo gardusig/cli \
                -f repo_slug="${REPO_SLUG}" -f repository="${REPOSITORY}" -f ref="${REF}"
              ;;
            operator-test|project-recurrence|markdown)
              gh workflow run "${WORKFLOW}.yml" --repo gardusig/cli
              ;;
            *)
              echo "unsupported catalog workflow: $WORKFLOW" >&2
              exit 1
              ;;
          esac
