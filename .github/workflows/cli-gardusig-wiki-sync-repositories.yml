name: Wiki repository inventory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: tasks
    steps:
      - name: Checkout yaml repo
        uses: actions/checkout@v4
        with:
          path: pipeline-src

      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: gardusig/wiki
          ref: main
          token: ${{ secrets.CENTRAL_PIPELINE_PAT }}
          path: wiki-src

      - name: Install cli
        run: pip install --no-cache-dir gardusig-cli

      - name: Sync repository inventory
        env:
          GH_TOKEN: ${{ secrets.CENTRAL_PIPELINE_PAT }}
        run: |
          cli configure import-env
          cli wiki repos sync --wiki-dir wiki-src --owner gardusig --ref main

      - name: Show changes
        working-directory: wiki-src
        run: git status --short
