name: reusable-chat-to-issues

on:
  workflow_call:
    inputs:
      chat_summary:
        required: true
        type: string
      apply_issues:
        required: false
        type: boolean
        default: false
      skip_distill:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  categorize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e .
      - name: Run chat → issues pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/chat
          printf '%s' "${{ inputs.chat_summary }}" > /tmp/chat/summary.md
          ARGS=(chat issues --from-file /tmp/chat/summary.md)
          [ "${{ inputs.skip_distill }}" = "true" ] && ARGS+=(--skip-distill)
          [ "${{ inputs.apply_issues }}" = "true" ] && ARGS+=(--apply --yes)
          cli "${ARGS[@]}"
