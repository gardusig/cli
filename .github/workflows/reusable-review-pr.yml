name: reusable-review-pr

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Review PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -e . 2>/dev/null || true
          cli review pr "${{ inputs.pr_number }}" --yes || true
