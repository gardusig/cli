name: reusable-release

on:
  workflow_call:

permissions:
  contents: write

jobs:
  release:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release artifacts
        run: |
          chmod +x scripts/release/*.sh scripts/docker/*.sh 2>/dev/null || true
          ./scripts/release/build.sh
