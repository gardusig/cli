name: branch-protection

# One-time (or on-demand) setup: require test workflow checks on a protected branch.
# Run manually: Actions → branch-protection → Run workflow
# Requires repo admin; GITHUB_TOKEN must be allowed to update branch protection
# (Settings → Actions → General → Workflow permissions → Read and write).

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to protect
        default: main
        required: true
      require_pr:
        description: Require pull request before merging
        type: boolean
        default: true

permissions:
  administration: write

jobs:
  apply:
    name: Apply branch protection
    runs-on: ubuntu-latest
    steps:
      - name: Require test status checks on branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ inputs.branch }}
          REQUIRE_PR: ${{ inputs.require_pr }}
        run: |
          set -euo pipefail
          if [[ "$REQUIRE_PR" == "true" ]]; then
            reviews='{"required_approving_review_count":0,"dismiss_stale_reviews":false}'
          else
            reviews='null'
          fi
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/branches/${BRANCH}/protection" \
            --input - <<EOF
          {
            "required_status_checks": {
              "strict": true,
              "checks": [
                {"context": "Unit tests (Docker)"},
                {"context": "Integration tests (Docker)"}
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": ${reviews},
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          EOF
          echo "Branch protection applied on ${BRANCH}."
          echo "Required checks: Unit tests (Docker), Integration tests (Docker)"
