name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI_DOCKERFILE: .github/Dockerfile

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target release
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${PYPI_API_TOKEN:-}" ]]; then
            echo "PYPI_API_TOKEN is not set" >&2
            exit 1
          fi
          docker build \
            -f "$CI_DOCKERFILE" \
            --target release \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            --build-arg "PYPI_API_TOKEN=${PYPI_API_TOKEN}" \
            .

  pypi-consumer:
    name: PyPI consumer
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target pypi-consumer
        run: |
          docker build \
            -f "$CI_DOCKERFILE" \
            --target pypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            .
