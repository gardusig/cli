repo_slug: database
repository: gardusig/database
environment: tasks
description: Private vault task board sync.
actions:
  notion-deploy:
    cli: [tasks, run, notion, deploy, --yes]
    secrets: [NOTION_TOKEN]
  github-deploy:
    cli: [tasks, run, github, deploy, --yes]
    env:
      GH_TOKEN: CENTRAL_PIPELINE_PAT
    secrets: [CENTRAL_PIPELINE_PAT]
  notion-ingest-pr:
    cli: [tasks, ingest-pr, --source, notion, --yes]
    secrets: [NOTION_TOKEN, CENTRAL_PIPELINE_PAT]
  github-ingest-pr:
    cli: [tasks, ingest-pr, --source, github, --yes]
    secrets: [CENTRAL_PIPELINE_PAT]
  github-prune-closed:
    cli: [tasks, run, github, prune, --closed-older-than, 7d, --yes]
    secrets: [CENTRAL_PIPELINE_PAT]
