name: reusable-test

on:
  workflow_call:
    inputs:
      timeout_minutes:
        required: false
        type: number
        default: 15

permissions:
  contents: read

jobs:
  pipeline:
    name: Test pipeline
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run test pipeline
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          chmod +x scripts/test/*.sh scripts/docker/*.sh 2>/dev/null || true
          ./scripts/test/all.sh
