name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PR_DOCKERFILE: docker/pull-request.dockerfile

jobs:
  test:
    name: PR pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Resolve versions
        id: meta
        run: bash scripts/pull-request/resolve-version.sh
      - name: docker build — version-check
        env:
          BASE_VERSION: ${{ steps.meta.outputs.base_version }}
        run: bash scripts/pull-request/build-version-check.sh
      - name: docker build — unit-test
        run: bash scripts/pull-request/build-unit-test.sh
      - name: docker build — testpypi
        env:
          CLI_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: bash scripts/pull-request/build-testpypi.sh
      - name: docker build — testpypi-consumer
        env:
          CLI_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/pull-request/build-testpypi-consumer.sh
