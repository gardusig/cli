name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr:
    name: Version, unit, TestPyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Read package versions
        id: meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import subprocess
          import tomllib
          from pathlib import Path

          head = tomllib.load(open("pyproject.toml", "rb"))["project"]["version"]
          subprocess.run(["git", "fetch", "origin", "main"], check=False)
          base_text = subprocess.check_output(
              ["git", "show", "origin/main:pyproject.toml"],
              text=True,
          )
          base = tomllib.loads(base_text.encode())["project"]["version"]
          print(f"version={head}")
          print(f"base_version={base}")
          PY
      - name: docker build --target pr
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          docker build \
            --target pr \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            --build-arg "BASE_VERSION=${{ steps.meta.outputs.base_version }}" \
            --build-arg "TESTPYPI_API_TOKEN=${TESTPYPI_API_TOKEN}" \
            .

  consumer:
    name: TestPyPI consumer
    needs: pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target testpypi-consumer
        run: |
          docker build \
            --target testpypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            .
