name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PR_DOCKERFILE: docker/pull-request.dockerfile
  CI_UNIT_TIMEOUT: 5m
  CI_INTEGRATION_TIMEOUT: 3m
  CI_DOCKER_BUILD_TIMEOUT: 5m
  CI_VERSION_CHECK_TIMEOUT: 2m
  CI_TESTPYPI_TIMEOUT: 5m
  CI_CONSUMER_TIMEOUT: 5m
  CI_RESOLVE_TIMEOUT: 2m

jobs:
  resolve:
    name: Resolve versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: Resolve PR and PyPI versions
        timeout-minutes: 3
        id: meta
        run: bash scripts/pull-request/resolve-version.sh

  version-check:
    name: Version check
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: docker build — version-check
        timeout-minutes: 5
        env:
          BASE_VERSION: ${{ needs.resolve.outputs.base_version }}
        run: bash scripts/pull-request/build-version-check.sh

  unit-test:
    name: Unit tests
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: docker build — unit-test
        timeout-minutes: 5
        run: bash scripts/pull-request/build-unit-test.sh

  testpypi:
    name: Publish to TestPyPI
    needs: unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: docker build — testpypi
        timeout-minutes: 5
        env:
          CLI_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: bash scripts/pull-request/build-testpypi.sh

  testpypi-consumer:
    name: Install from TestPyPI
    needs: [resolve, testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: docker build — testpypi-consumer
        timeout-minutes: 5
        env:
          CLI_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: bash scripts/pull-request/build-testpypi-consumer.sh
