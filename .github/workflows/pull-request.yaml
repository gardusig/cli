name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PR_DOCKERFILE: docker/pull-request.dockerfile

jobs:
  resolve:
    name: Resolve versions
    runs-on: ubuntu-latest
    timeout-minutes: 9
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - id: meta
        name: docker — resolve
        timeout-minutes: 3
        run: |
          docker build -f "${PR_DOCKERFILE}" --target resolve -t ci-pr-resolve .
          docker run --rm \
            -e GITHUB_OUTPUT \
            -v "${GITHUB_OUTPUT}:${GITHUB_OUTPUT}" \
            ci-pr-resolve

  version-check:
    name: Version check
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - id: checkout
        uses: actions/checkout@v4
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - id: version-check
        name: docker build — version-check
        timeout-minutes: 6
        env:
          BASE_VERSION: ${{ needs.resolve.outputs.base_version }}
        run: |
          docker build -f "${PR_DOCKERFILE}" --target version-check \
            --build-arg "BASE_VERSION=${BASE_VERSION}" .

  unit-test:
    name: Unit tests
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - id: checkout
        uses: actions/checkout@v4
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - id: unit-test
        name: docker build — unit-test
        timeout-minutes: 9
        run: docker build -f "${PR_DOCKERFILE}" --target unit-test .
