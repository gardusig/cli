name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr:
    name: Version, unit, TestPyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Resolve versions on runner
        id: meta
        run: |
          version="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          base_version="$(bash scripts/ci/host-base-version.sh origin/main)"
          if [[ -z "$base_version" ]]; then
            echo "failed to resolve base version from origin/main" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
      - name: docker build --target pr
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          docker build \
            --target pr \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            --build-arg "BASE_VERSION=${{ steps.meta.outputs.base_version }}" \
            --build-arg "TESTPYPI_API_TOKEN=${TESTPYPI_API_TOKEN}" \
            .

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build --target integration-test
        run: docker build --target integration-test .

  consumer:
    name: TestPyPI consumer
    needs: pr
    if: ${{ secrets.TESTPYPI_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target testpypi-consumer
        run: |
          docker build \
            --target testpypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            .
