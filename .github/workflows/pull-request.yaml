name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_UNIT_TIMEOUT: 5m
  CI_INTEGRATION_TIMEOUT: 3m
  CI_DOCKER_BUILD_TIMEOUT: 10m
  CI_VERSION_CHECK_TIMEOUT: 2m
  CI_TESTPYPI_TIMEOUT: 8m
  CI_CONSUMER_TIMEOUT: 5m
  CI_RESOLVE_TIMEOUT: 2m

jobs:
  test:
    name: PR pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 3
      - name: Resolve versions
        timeout-minutes: 3
        id: meta
        run: bash scripts/pull-request/resolve-version.sh
      - name: docker build — version-check
        timeout-minutes: 5
        env:
          BASE_VERSION: ${{ steps.meta.outputs.base_version }}
        run: bash scripts/pull-request/build-version-check.sh
      - name: docker build — unit-test
        timeout-minutes: 10
        run: bash scripts/pull-request/build-unit-test.sh
      - name: docker build — testpypi
        timeout-minutes: 10
        env:
          CLI_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: bash scripts/pull-request/build-testpypi.sh
      - name: docker build — testpypi-consumer
        timeout-minutes: 10
        env:
          CLI_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/pull-request/build-testpypi-consumer.sh
