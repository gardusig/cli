name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Resolve versions on runner
        id: meta
        run: |
          version="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          base_version="$(bash scripts/ci/host-base-version.sh origin/main)"
          if [[ -z "$base_version" ]]; then
            echo "failed to resolve base version from origin/main" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
      - name: docker build --target version-check
        run: |
          docker build \
            --target version-check \
            --build-arg "BASE_VERSION=${{ steps.meta.outputs.base_version }}" \
            .

  unit:
    name: Unit tests
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build --target unit-test
        run: docker build --target unit-test .

  pypi-test:
    name: TestPyPI
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build --target pypi-test
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          docker build \
            --target pypi-test \
            --build-arg "CLI_RELEASE_VERSION=${{ needs.version.outputs.version }}" \
            --build-arg "TESTPYPI_API_TOKEN=${TESTPYPI_API_TOKEN}" \
            .

  post-publish:
    name: Integration + TestPyPI consumer
    needs: [version, pypi-test]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build --target integration-test
        run: timeout 10m docker build --target integration-test .
      - name: docker build --target testpypi-consumer
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          if [[ -z "${TESTPYPI_API_TOKEN:-}" ]]; then
            echo "skip TestPyPI consumer (TESTPYPI_API_TOKEN not set)"
            exit 0
          fi
          docker build \
            --target testpypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ needs.version.outputs.version }}" \
            .
