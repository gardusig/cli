name: Python CLI main release

on:
  repository_dispatch:
    types: [python-cli-main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout yaml workflow library
        uses: actions/checkout@v4
        with:
          repository: gardusig/yaml
          path: pipeline-src

      - name: Checkout gardusig/cli
        uses: actions/checkout@v4
        with:
          repository: gardusig/cli
          ref: ${{ inputs.ref || github.event.client_payload.ref || 'main' }}
          token: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
          path: app-src
          fetch-depth: 0

      - name: Install python-cli from source
        working-directory: app-src
        run: |
          pip install --no-cache-dir -e ".[dev]"

      - name: Release to PyPI and GitHub
        working-directory: app-src
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          GH_TOKEN: ${{ secrets.CENTRAL_PIPELINE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          cli release main --yes

      - name: Read release version
        id: version
        working-directory: app-src
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print("version=" + tomllib.load(f)["project"]["version"])
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CLI base image
        run: |
          docker buildx build \
            --load \
            -f pipeline-src/docker/cli-base.dockerfile \
            --target cli-base \
            --build-arg CLI_PACKAGE="gardusig-cli==${{ steps.version.outputs.version }}" \
            -t gardusig-cli-base:${{ steps.version.outputs.version }} \
            pipeline-src
