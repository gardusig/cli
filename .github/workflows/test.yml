name: test

# Status check names (for branch protection): "Unit tests (Docker)", "Integration tests (Docker)"
# Runs on every branch push and on pull requests so checks appear on PRs and on the branch tip.

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build unit test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: unit
          load: true
          tags: cli:unit
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Unit tests in container
        env:
          CLI_DOCKER_IMAGE: cli:unit
          CLI_DOCKER_TARGET: unit
          CLI_DOCKER_SKIP_BUILD: "1"
        run: ./scripts/test-unit.sh

  integration:
    name: Integration tests (Docker)
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build integration test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: integration
          load: true
          tags: |
            cli:integration
            cli:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Integration tests in container
        env:
          CLI_DOCKER_IMAGE: cli:integration
          CLI_DOCKER_TARGET: integration
          CLI_DOCKER_SKIP_BUILD: "1"
        run: ./scripts/test-integration.sh
