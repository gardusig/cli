name: release

# Tag push (v*) → build gardusig-cli at tag version and upload to PyPI.
# Secret: PYPI_API_TOKEN

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cli + build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine .
          pip install -e ".[dev]"

      - name: Build and upload from tag version
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/pypi/*.sh
          ./scripts/pypi/release.sh
