name: release

# Tag push (v*) → ./scripts/release.sh (Docker cli:release → PyPI).
# Instructions: docs/release.md

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Publish via release script
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/release.sh scripts/docker/run-release.sh scripts/pypi/*.sh
          ./scripts/release.sh
