name: release

# Sequential release pipeline — same as ./scripts/release/build.sh + publish.sh (Docker).
# Local: GITHUB_REF_NAME=v0.1.0 ./scripts/release/build.sh

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    name: Release pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build release artifacts
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/release/*.sh scripts/docker/*.sh
          ./scripts/release/build.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/*

      - name: Publish to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: ./scripts/release/publish.sh
