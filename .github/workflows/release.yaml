name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CI_DOCKERFILE: .github/Dockerfile

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: Validate tag matches pyproject
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          test "${{ steps.meta.outputs.version }}" = "$tag"
      - name: Build sdist/wheel
        run: |
          pip install --no-cache-dir build
          python -m build
      - name: Publish to PyPI (trusted publishing)
        id: oidc
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
      - name: Publish to PyPI (API token fallback)
        if: steps.oidc.outcome == 'failure'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -z "${TWINE_PASSWORD}" ]]; then
            echo "OIDC publish failed and PYPI_API_TOKEN is not set" >&2
            exit 1
          fi
          pip install --no-cache-dir twine
          twine upload dist/* --skip-existing

  consumer:
    name: PyPI consumer
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target pypi-consumer
        run: |
          docker build \
            -f "$CI_DOCKERFILE" \
            --target pypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            .
