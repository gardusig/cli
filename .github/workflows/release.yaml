name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_DOCKERFILE: docker/release.dockerfile
  RUNTIME_IMAGE: binarylifter/gardusig-cli

jobs:
  publish-pypi:
    name: Publish to PyPI
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve package version
        id: meta
        run: bash scripts/release/resolve-version.sh
      - name: docker build — pypi
        env:
          CLI_RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: bash scripts/release/build-pypi-release.sh

  docker-release:
    name: Docker image
    if: github.ref == 'refs/heads/main'
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve package version
        id: meta
        run: bash scripts/release/resolve-version.sh
      - name: docker build — runtime
        env:
          CLI_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/release/build-runtime-image.sh
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push image tags
        env:
          CLI_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/release/push-runtime-image.sh
      - name: Pull and smoke-test published image
        env:
          CLI_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/release/smoke-runtime-image.sh

  github-release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release version
        id: meta
        run: bash scripts/release/resolve-tag-version.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          CLI_VERSION: ${{ steps.meta.outputs.version }}
        run: bash scripts/release/create-github-release.sh
