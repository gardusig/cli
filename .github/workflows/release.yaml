name: Release

# Tag-driven release: git tag X.Y.Z → TestPyPI → integration → PyPI → Docker → GitHub release.
on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_DOCKERFILE: docker/release.dockerfile
  RUNTIME_IMAGE: binarylifter/gardusig-cli

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 6
    outputs:
      git_tag: ${{ steps.meta.outputs.git_tag }}
      version: ${{ steps.meta.outputs.version }}
      docker_tag: ${{ steps.meta.outputs.docker_tag }}
    steps:
      - id: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
        timeout-minutes: 3
      - id: meta
        name: docker — resolve
        timeout-minutes: 3
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target resolve -t ci-release-resolve .
          docker run --rm \
            -e GITHUB_OUTPUT \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -v "${GITHUB_OUTPUT}:${GITHUB_OUTPUT}" \
            ci-release-resolve

  publish-testpypi:
    name: Publish to TestPyPI
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - id: checkout
        uses: actions/checkout@v5
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v4
        timeout-minutes: 3
      - id: testpypi
        name: Publish to TestPyPI
        timeout-minutes: 6
        env:
          CLI_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target testpypi \
            --build-arg "CLI_RELEASE_VERSION=${CLI_RELEASE_VERSION}" \
            --build-arg "TESTPYPI_API_TOKEN=${TESTPYPI_API_TOKEN}" .

  testpypi-consumer:
    name: Install from TestPyPI
    needs: [resolve, publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - id: checkout
        uses: actions/checkout@v5
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v4
        timeout-minutes: 3
      - id: testpypi-consumer
        name: Install from TestPyPI
        timeout-minutes: 6
        env:
          CLI_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target testpypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${CLI_RELEASE_VERSION}" .

  publish-pypi:
    name: Publish to PyPI
    needs: [resolve, testpypi-consumer]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - id: checkout
        uses: actions/checkout@v5
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v4
        timeout-minutes: 3
      - id: publish-pypi
        name: Publish to PyPI
        timeout-minutes: 6
        env:
          CLI_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target pypi \
            --build-arg "CLI_RELEASE_VERSION=${CLI_RELEASE_VERSION}" \
            --build-arg "PYPI_API_TOKEN=${PYPI_API_TOKEN}" .

  publish-docker:
    name: Publish to Docker
    needs: [resolve, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 33
    steps:
      - id: checkout
        uses: actions/checkout@v5
        timeout-minutes: 3
      - id: buildx
        uses: docker/setup-buildx-action@v4
        timeout-minutes: 3
      - id: runtime
        name: Publish to Docker — build runtime
        timeout-minutes: 9
        env:
          CLI_VERSION: ${{ needs.resolve.outputs.docker_tag }}
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target runtime \
            --build-arg "CLI_VERSION=${CLI_VERSION}" \
            -t "${RUNTIME_IMAGE}:${CLI_VERSION}" \
            -t "${RUNTIME_IMAGE}:latest" .
      - id: ci-tools
        name: docker build — ci-tools
        timeout-minutes: 3
        run: |
          docker build -f "${RELEASE_DOCKERFILE}" --target ci-push -t ci-release-push .
          docker build -f "${RELEASE_DOCKERFILE}" --target ci-smoke -t ci-release-smoke .
      - id: docker-login
        name: Log in to Docker Hub
        uses: docker/login-action@v4
        timeout-minutes: 3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: publish-docker
        name: Publish to Docker
        timeout-minutes: 6
        env:
          CLI_VERSION: ${{ needs.resolve.outputs.docker_tag }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e CLI_VERSION="${CLI_VERSION}" \
            -e RUNTIME_IMAGE="${RUNTIME_IMAGE}" \
            ci-release-push
      - id: runtime-smoke
        name: Publish to Docker — smoke
        timeout-minutes: 6
        env:
          CLI_VERSION: ${{ needs.resolve.outputs.docker_tag }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e CLI_VERSION="${CLI_VERSION}" \
            -e RUNTIME_IMAGE="${RUNTIME_IMAGE}" \
            ci-release-smoke

  publish-github:
    name: Publish to GitHub
    needs: [resolve, publish-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - id: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
        timeout-minutes: 3
      - id: ci-tools
        name: docker build — ci-github-release
        timeout-minutes: 3
        run: docker build -f "${RELEASE_DOCKERFILE}" --target ci-github-release -t ci-github-release .
      - id: publish-github
        name: Publish to GitHub
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.git_tag }}
          CLI_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          docker run --rm \
            -e GH_TOKEN="${GH_TOKEN}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e RELEASE_TAG="${RELEASE_TAG}" \
            -e CLI_VERSION="${CLI_VERSION}" \
            -e RUNTIME_IMAGE="${RUNTIME_IMAGE}" \
            ci-github-release
