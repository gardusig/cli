name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI_DOCKERFILE: .github/Dockerfile

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target release
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          docker build \
            -f "$CI_DOCKERFILE" \
            --target release \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            --build-arg "PYPI_API_TOKEN=${PYPI_API_TOKEN}" \
            .

  consumer:
    name: PyPI consumer
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Read package version
        id: meta
        run: |
          echo "version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"
      - name: docker build --target pypi-consumer
        run: |
          docker build \
            -f "$CI_DOCKERFILE" \
            --target pypi-consumer \
            --build-arg "CLI_RELEASE_VERSION=${{ steps.meta.outputs.version }}" \
            .
