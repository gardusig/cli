credentials:
  - id: notion
    key: notion.token
    env: NOTION_TOKEN
    example: secret_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.notion.token_file
    used_by: [cli notion, cli tasks ingest-pr]
    github:
      repo: gardusig/github-pipelines
      environment: tasks
      secret: NOTION_TOKEN
    help:
      google: https://www.google.com/search?q=how+to+create+notion+internal+integration+token
      gemini_prompt: "How do I create a Notion internal integration token for API access? List the exact steps and what the token looks like."
  - id: backup-zip
    key: backup.password
    env: BACKUP_ZIP_PASSWORD
    example: long-random-password
    token_file_key: auth.backup.token_file
    used_by: [cli drive ingest]
    github: null
    help:
      google: https://www.google.com/search?q=how+to+generate+a+strong+random+password+openssl
      gemini_prompt: "How do I generate a strong local-only password for encrypted backup zip files?"
  - id: deepseek
    key: deepseek.token
    env: DEEPSEEK_API_KEY
    example: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.deepseek.token_file
    used_by: [cli chat, cli opencode]
    github: null
    help:
      google: https://www.google.com/search?q=how+to+create+a+deepseek+api+key
      gemini_prompt: "How do I create a DeepSeek API key and store it as an environment variable?"
  - id: pypi
    key: pypi.token
    env: PYPI_API_TOKEN
    example: pypi-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.pypi.token_file
    used_by: [cli pypi upload]
    github:
      repo: gardusig/github-pipelines
      environment: release
      secret: PYPI_API_TOKEN
    help:
      google: https://www.google.com/search?q=how+to+create+a+pypi+api+token
      gemini_prompt: "How do I create a PyPI API token scoped to one project and use it in GitHub Actions?"
  - id: google-drive
    key: google_drive.token
    env: GOOGLE_DRIVE_TOKEN
    example: ya29.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.google_drive.token_file
    used_by: [cli drive upload, cli drive download]
    github: null
    help:
      google: https://www.google.com/search?q=google+drive+api+oauth+access+token
      gemini_prompt: "How do I obtain a Google Drive API OAuth access token for uploading files with a personal backup script?"
  - id: onedrive
    key: onedrive.token
    env: ONEDRIVE_TOKEN
    example: EwBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.onedrive.token_file
    used_by: [cli drive upload, cli drive download]
    github: null
    help:
      google: https://www.google.com/search?q=microsoft+graph+onedrive+oauth+access+token
      gemini_prompt: "How do I obtain a Microsoft Graph OAuth access token for OneDrive file upload?"
  - id: testpypi
    key: testpypi.token
    env: TESTPYPI_API_TOKEN
    example: pypi-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.testpypi.token_file
    used_by: [cli pypi upload --repository testpypi]
    github:
      repo: gardusig/github-pipelines
      environment: default
      secret: TESTPYPI_API_TOKEN
    help:
      google: https://www.google.com/search?q=how+to+create+a+testpypi+api+token
      gemini_prompt: "How do I create a TestPyPI API token for package upload testing?"
  - id: docker-hub
    key: docker.token
    env: DOCKERHUB_TOKEN
    example: dckr_pat_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    token_file_key: auth.docker.token_file
    used_by: [docker login, docker push in CI]
    github:
      repo: gardusig/cli
      environment: default
      secret: DOCKERHUB_TOKEN
    help:
      google: https://www.google.com/search?q=how+to+create+a+docker+hub+access+token
      gemini_prompt: "How do I create a Docker Hub personal access token for GitHub Actions docker login?"
