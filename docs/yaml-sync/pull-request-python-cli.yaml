repo: gardusig/cli
selective: true
dockerfile: Dockerfile
dockerignore: .dockerignore
jobs:
- id: version-check
  name: Version gate
  target: version-check
- id: unit-test
  name: Unit tests
  target: unit-test
  needs: version-check
- id: testpypi
  name: TestPyPI publish
  target: testpypi
  needs: unit-test
  build_args_from_ref: true
  secrets:
    TESTPYPI_API_TOKEN: TESTPYPI_API_TOKEN
- id: testpypi-consumer
  name: TestPyPI consumer integration
  target: testpypi-consumer
  needs: testpypi
  build_args_from_ref: true
