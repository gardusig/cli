# OpenCode provider/model IDs (provider/model).
# Override via env: OPENCODE_MODEL_CHAT, OPENCODE_MODEL_REASON, OPENCODE_MODEL_CATEGORIZE

default_model: deepseek/deepseek-chat

roles:
  chat:
    model: deepseek/deepseek-chat
    description: Cheapest — summaries and rolling chat
  reason:
    model: deepseek/deepseek-reasoner
    description: R1 — planning and code reasoning
  categorize:
    model: deepseek/deepseek-chat
    description: R4-class — topic bucketing and issue craft
