# Example user config — copy to ~/.config/cli/config.yaml or set paths via cli configure.
backup:
  tags_dir: ~/git-tags
  repositories: []

notion:
  database_id: your-notion-database-id
  task_root: ~/tasks
  pairs_file: tasks.pairs.json
  cleanup_before_deploy: true

chrome:
  profile: Default
  bookmarks_file: ~/bookmarks.html
  downloads_dir: ~/Downloads
