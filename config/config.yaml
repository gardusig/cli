backup:
  tags_dir: ~/Library/Mobile Documents/com~apple~CloudDocs/git-tags
  repositories:
    - path: ~/git-local/cli

notion:
  database_id: ""                    # Notion database ID (board must exist)
  task_root: ~/git-local/private/configured/tasks
  pairs_file: config/notion/tasks.pairs.json
  cleanup_before_deploy: true
  properties:
    title: Name
    priority: Priority
    tag: Tag
    frequency: Frequency
    interval: Interval
    last_done: "Last done"
    forced_status: "Forced status"

chrome:
  profile: Default
  # Local bookmarks HTML (Chrome export/import). Absolute or ~ path recommended.
  bookmarks_file: ""                   # private path, e.g. ~/git-local/private/.../bookmarks.html
  downloads_dir: ~/Downloads
