version: 1
repository: gardusig/cli
description: Reusable GitHub Actions workflow library (manual dispatch, repository_dispatch, workflow_call).

workflows:
  pull-request:
    workflow: .github/workflows/lib/pull-request-router.yml
    triggers: [workflow_call, repository_dispatch, workflow_dispatch]
    dispatch_type: pull-request
    description: Resolve app .github/pull-request.yaml and run staged Docker CI.

  operator:
    workflow: .github/workflows/lib/operator-dispatch.yml
    triggers: [repository_dispatch, workflow_dispatch]
    dispatch_type: operator
    description: Route operator lanes (test, plan, execute, review).

  operator-test:
    workflow: .github/workflows/lib/operator-test.yml
    triggers: [workflow_call, workflow_dispatch]
    description: Selective package resolve + Docker test matrix.

  operator-plan:
    workflow: .github/workflows/lib/operator-craft-plan.yml
    triggers: [workflow_call, workflow_dispatch]
    description: OpenCode issue plan lane.

  operator-execute:
    workflow: .github/workflows/lib/operator-craft-execute.yml
    triggers: [workflow_call, workflow_dispatch]
    description: OpenCode issue execute lane.

  operator-review:
    workflow: .github/workflows/lib/operator-review.yml
    triggers: [workflow_call, workflow_dispatch]
    description: OpenCode pull request review lane.

  operator-runner-publish:
    workflow: .github/workflows/lib/operator-runner-publish.yml
    triggers: [workflow_dispatch, push]
    description: Publish ghcr.io/gardusig/operator-runner.

  release:
    workflow: .github/workflows/lib/release.yml
    triggers: [repository_dispatch, workflow_dispatch]
    dispatch_type: release
    description: Resolve app .github/release.yaml and run release Docker targets.

  repo-review:
    workflow: .github/workflows/lib/repo-review.yml
    triggers: [repository_dispatch, workflow_dispatch]
    dispatch_type: repo-review
    description: Resolve app .github/repo-review.yaml for maintainer review jobs.

  tasks:
    workflow: .github/workflows/lib/tasks.yml
    triggers: [repository_dispatch, workflow_dispatch, schedule]
    dispatch_type: tasks
    description: Database vault task ingestion and deploy.

  project-recurrence:
    workflow: .github/workflows/lib/project-recurrence.yml
    triggers: [schedule, workflow_dispatch]
    description: Poll recurrent GitHub project boards.

  markdown:
    workflow: .github/workflows/lib/markdown.yml
    triggers: [workflow_dispatch]
    description: Deprecated standalone markdown gate (prefer repo Dockerfile lint stage).
