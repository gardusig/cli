version: 1
repository: gardusig/cli
description: In-repo CI workflows for gardusig/cli.

workflows:
  pull-request:
    workflow: .github/workflows/pull-request.yaml
    triggers: [pull_request]
    description: Version gate, unit tests, TestPyPI publish, and consumer integration via Docker.

  release:
    workflow: .github/workflows/release.yaml
    triggers: [push]
    description: PyPI publish and lean Docker image on main; GitHub release on version tags.
