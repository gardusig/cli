# Docker CI / test harness: paths relative to the copied workdir (git repo at ".").
# Set via CLI_CONFIG_DIR in CI and tests/conftest.py (autouse).
backup:
  tags_dir: .integration-scratch/ci-tags
  repositories:
    - path: .

notion:
  database_id: ci-test-database
  task_root: tests/fixtures/notion/tasks
  pairs_file: tasks.pairs.json
  cleanup_before_deploy: false

chrome:
  profile: Default
  bookmarks_file: tests/fixtures/bookmarks.html
  downloads_dir: /tmp/Downloads

gh:
  issues:
    repo: gardusig/private
