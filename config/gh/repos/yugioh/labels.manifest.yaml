protected:
  - bug
  - enhancement
  - documentation

labels:
  - name: issue-type:epic
    color: "5319E7"
    description: Parent epic
  - name: issue-type:child
    color: "C5DEF5"
    description: Child deliverable
  - name: issue-type:task
    color: "BFDADC"
    description: Standalone task
  - name: priority:0
    color: "B60205"
    description: Highest priority
  - name: priority:1
    color: "D93F0B"
    description: High priority
  - name: priority:3
    color: "0E8A16"
    description: Lower priority
  - name: priority:4
    color: "1D76DB"
    description: Tech debt
  - name: epic:ygo-mvp
    color: "B60205"
    description: MVP deployment
  - name: epic:ygo-hub
    color: "0E8A16"
    description: Thin workflows rollout
  - name: epic:ygo-ops
    color: "D93F0B"
    description: Observability and cost
  - name: epic:ygo-followup
    color: "0E8A16"
    description: Post-MVP follow-ups
  - name: epic:ygo-domain
    color: "1D76DB"
    description: Domain issue stubs
