# Example user config — copy to ~/.config/cli/config.yaml or set paths via .env
backup:
  tags_dir: ~/Library/Mobile Documents/com~apple~CloudDocs/git-tags
  repositories:
    - path: ~/git-local/cli
    - path: ~/git-local/private
      encrypted: true
  replicas:
    - type: cloud
      provider: google
      root: git-tags

notion:
  database_id: your-notion-database-id
  task_root: ~/github/private/tasks
  pairs_file: config/notion/tasks.pairs.json
  link_branch: main
  link_repo: owner/private-tasks-repo
  labels_manifest: labels.manifest.yaml
  cleanup_before_deploy: true

chrome:
  profile: Default
  bookmarks_file: ~/path/to/bookmarks.html
  downloads_dir: ~/Downloads
  photos_dir: ~/path/to/photos
  photos_takeout_dir: ""
