[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
# PyPI distribution name (repo remains github.com/gardusig/cli).
name = "gardusig-cli"
version = "0.1.0"
description = "macOS CLI for git shortcuts, backups, and sync workflows"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "gardusig" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Operating System :: MacOS",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Version Control :: Git",
  "Topic :: Utilities",
]
dependencies = [
  "typer>=0.12",
  "pydantic>=2.0",
  "pydantic-settings>=2.0",
  "PyYAML>=6.0",
  "rich>=13.0",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "build>=1.0",
  "pytest>=8.0",
  "pytest-cov>=5.0",
  "pytest-timeout>=2.3",
  "twine>=5.0",
]

[project.urls]
Homepage = "https://github.com/gardusig/cli"
Documentation = "https://github.com/gardusig/cli#readme"
Repository = "https://github.com/gardusig/cli"
Issues = "https://github.com/gardusig/cli/issues"
Changelog = "https://github.com/gardusig/cli/releases"

[project.scripts]
cli = "gardusig_cli.cli:run"

[tool.setuptools.packages.find]
where = ["."]
include = ["gardusig_cli*"]
exclude = ["gardusig_cli.integration*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
python_files = ["test_*.py", "*_test.py"]
markers = [
  "integration: tests that may require Docker or external runtime isolation",
]
filterwarnings = [
  "error",
]
timeout = 30
timeout_method = "thread"

[tool.coverage.run]
source = ["gardusig_cli"]
branch = false

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_empty = true

# Unit Docker job uses coverage-unit.ini (omits gardusig_cli/integration/* from coverage totals).
